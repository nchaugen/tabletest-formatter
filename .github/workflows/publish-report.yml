name: Publish TableTest report

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
      - name: Cache Maven repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-report-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-report-
      - name: Generate report
        run: >
          mvn -Preport -pl tabletest-formatter-core
          test org.tabletest:tabletest-reporter-maven-plugin:report
          --no-transfer-progress
      - uses: actions/upload-pages-artifact@v3
        with:
          path: tabletest-formatter-core/target/generated-docs/tabletest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
