name: Smoke Test Samples

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 08:00 UTC
  push:
    branches: [main]
    paths: ['samples/**']
  pull_request:
    paths: ['samples/**']
  workflow_dispatch:

jobs:
  smoketest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-samples-${{ hashFiles('samples/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-samples-
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run smoke tests
        run: ./samples/smoke-test.sh
